services:
  - type: web
    name: mrhammadclaw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: MRHAMMADCLAW_STATE_DIR
        value: /data/.mrhammadclaw
      - key: MRHAMMADCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: MRHAMMADCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: mrhammadclaw-data
      mountPath: /data
      sizeGB: 1
