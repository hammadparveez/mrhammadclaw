services:
  mrhammadclaw-gateway:
    image: ${MRHAMMADCLAW_IMAGE:-mrhammadclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      MRHAMMADCLAW_GATEWAY_TOKEN: ${MRHAMMADCLAW_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${MRHAMMADCLAW_CONFIG_DIR}:/home/node/.mrhammadclaw
      - ${MRHAMMADCLAW_WORKSPACE_DIR}:/home/node/.mrhammadclaw/workspace
    ports:
      - "${MRHAMMADCLAW_GATEWAY_PORT:-18789}:18789"
      - "${MRHAMMADCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${MRHAMMADCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  mrhammadclaw-cli:
    image: ${MRHAMMADCLAW_IMAGE:-mrhammadclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      MRHAMMADCLAW_GATEWAY_TOKEN: ${MRHAMMADCLAW_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${MRHAMMADCLAW_CONFIG_DIR}:/home/node/.mrhammadclaw
      - ${MRHAMMADCLAW_WORKSPACE_DIR}:/home/node/.mrhammadclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
